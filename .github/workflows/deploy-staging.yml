name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  id-token: write
  contents: read

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Build frontend (staging)
        env:
          VITE_API_BASE_URL: ${{ vars.STAGING_API_BASE_URL || 'https://295rzgn87a.execute-api.us-east-1.amazonaws.com' }}
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build Stripe Lambda layer
        run: |
          rm -rf layers/stripe/python
          mkdir -p layers/stripe/python
          python -m pip install -q stripe -t layers/stripe/python
          test -d layers/stripe/python/stripe

      - name: Build Cryptography Lambda layer
        run: |
          rm -rf layers/cryptography/python
          mkdir -p layers/cryptography/python
          python -m pip install -q cryptography -t layers/cryptography/python
          test -d layers/cryptography/python/cryptography
      
      - name: Deploy staging stack with CDK
        env:
          DEPLOY_STAGE: staging
          SETUP_KEY: ${{ secrets.SETUP_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_50GB: ${{ secrets.STRIPE_PRICE_50GB }}
          STRIPE_PRICE_200GB: ${{ secrets.STRIPE_PRICE_200GB }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          STRIPE_SUCCESS_URL: ${{ secrets.STRIPE_SUCCESS_URL }}
          STRIPE_CANCEL_URL: ${{ secrets.STRIPE_CANCEL_URL }}
          CLOUDFRONT_KEY_PAIR_ID: ${{ secrets.CLOUDFRONT_KEY_PAIR_ID }}
          CLOUDFRONT_PRIVATE_KEY: ${{ secrets.CLOUDFRONT_PRIVATE_KEY }}
        run: |
          npm install -g aws-cdk
          cd infra
          python -m pip install -q -r requirements.txt
          cdk deploy TeamMediaHubStack-Staging --require-approval never
