<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Team Media Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .offline-container {
            text-align: center;
            max-width: 400px;
        }
        .offline-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            opacity: 0.8;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #bbb;
            margin-bottom: 20px;
        }
        .action {
            margin-top: 30px;
        }
        button {
            background: #00aeff;
            color: #0f0f1e;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #0088cc;
        }
        .cached {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
        .cached p {
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <svg class="offline-icon" viewBox="0 0 24 24" fill="none" stroke="#00aeff" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="9"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <h1>You're Offline</h1>
        <p>Check your internet connection and try again.</p>
        <p>Previously cached content may be available if you navigate back.</p>
        <div class="action">
            <button onclick="window.location.reload()">Try Again</button>
        </div>
        <div class="cached">
            <p>💾 Some content is cached locally and may be available</p>
        </div>
    </div>
</body>
</html>
